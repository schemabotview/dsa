<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 340" width="580" height="340" font-family="monospace" font-size="12">
  <rect width="580" height="340" fill="#0f1117" rx="12"/>

  <!-- ═══ INSERT ═══ -->
  <text x="290" y="26" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Insert After Node — O(1) Pointer Rewire</text>

  <!-- BEFORE -->
  <text x="32" y="50" fill="#94a3b8" font-size="11" font-weight="bold">Before</text>

  <!-- Node A -->
  <rect x="32"  y="58" width="46" height="32" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="78"  y="58" width="30" height="32" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="55"  y="78" fill="#f8fafc" font-size="13" font-weight="bold" text-anchor="middle">A</text>
  <text x="93"  y="78" fill="#7dd3fc" font-size="10" text-anchor="middle">●</text>
  <!-- old pointer A→C -->
  <line x1="108" y1="74" x2="200" y2="74" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#bl)"/>

  <!-- Node C -->
  <rect x="200" y="58" width="46" height="32" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="246" y="58" width="30" height="32" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="223" y="78" fill="#f8fafc" font-size="13" font-weight="bold" text-anchor="middle">C</text>
  <text x="261" y="78" fill="#475569" font-size="10" text-anchor="middle">∅</text>

  <!-- new node B floating -->
  <rect x="360" y="58" width="46" height="32" fill="#14532d" rx="3" stroke="#22c55e" stroke-width="2"/>
  <rect x="406" y="58" width="30" height="32" fill="#0a2a14" rx="3" stroke="#22c55e" stroke-width="1"/>
  <text x="383" y="78" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">B</text>
  <text x="421" y="78" fill="#475569" font-size="10" text-anchor="middle">∅</text>
  <text x="383" y="50" fill="#86efac" font-size="10" text-anchor="middle">new node</text>

  <!-- AFTER -->
  <text x="32" y="124" fill="#94a3b8" font-size="11" font-weight="bold">After  (insert B between A and C)</text>

  <!-- Node A after -->
  <rect x="32"  y="132" width="46" height="32" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="78"  y="132" width="30" height="32" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="55"  y="152" fill="#f8fafc" font-size="13" font-weight="bold" text-anchor="middle">A</text>
  <text x="93"  y="152" fill="#86efac" font-size="10" text-anchor="middle">●</text>
  <!-- step 1: A.next = B -->
  <line x1="108" y1="148" x2="200" y2="148" stroke="#86efac" stroke-width="2" marker-end="url(#gl)"/>
  <text x="154" y="143" fill="#86efac" font-size="9" text-anchor="middle">① A.next = B</text>

  <!-- Node B after -->
  <rect x="200" y="132" width="46" height="32" fill="#14532d" rx="3" stroke="#22c55e" stroke-width="2"/>
  <rect x="246" y="132" width="30" height="32" fill="#0a2a14" rx="3" stroke="#22c55e" stroke-width="1"/>
  <text x="223" y="152" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">B</text>
  <text x="261" y="152" fill="#86efac" font-size="10" text-anchor="middle">●</text>
  <!-- step 2: B.next = C -->
  <line x1="276" y1="148" x2="360" y2="148" stroke="#86efac" stroke-width="2" marker-end="url(#gl)"/>
  <text x="318" y="143" fill="#86efac" font-size="9" text-anchor="middle">② B.next = C</text>

  <!-- Node C after -->
  <rect x="360" y="132" width="46" height="32" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="406" y="132" width="30" height="32" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="383" y="152" fill="#f8fafc" font-size="13" font-weight="bold" text-anchor="middle">C</text>
  <text x="421" y="152" fill="#475569" font-size="10" text-anchor="middle">∅</text>

  <text x="500" y="148" fill="#86efac" font-size="11">2 pointer</text>
  <text x="500" y="162" fill="#86efac" font-size="11">changes → O(1)</text>

  <!-- divider -->
  <line x1="20" y1="186" x2="560" y2="186" stroke="#1e293b" stroke-width="1"/>

  <!-- ═══ DELETE ═══ -->
  <text x="290" y="208" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Delete a Node — O(1) Pointer Rewire</text>

  <!-- BEFORE delete -->
  <text x="32" y="230" fill="#94a3b8" font-size="11" font-weight="bold">Before  (delete B)</text>

  <rect x="32"  y="238" width="46" height="32" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="78"  y="238" width="30" height="32" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="55"  y="258" fill="#f8fafc" font-size="13" font-weight="bold" text-anchor="middle">A</text>
  <text x="93"  y="258" fill="#7dd3fc" font-size="10" text-anchor="middle">●</text>
  <line x1="108" y1="254" x2="200" y2="254" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#bl)"/>

  <rect x="200" y="238" width="46" height="32" fill="#7f1d1d" rx="3" stroke="#ef4444" stroke-width="2"/>
  <rect x="246" y="238" width="30" height="32" fill="#450a0a" rx="3" stroke="#ef4444" stroke-width="1"/>
  <text x="223" y="258" fill="#fca5a5" font-size="13" font-weight="bold" text-anchor="middle">B</text>
  <text x="261" y="258" fill="#fca5a5" font-size="10" text-anchor="middle">●</text>
  <line x1="276" y1="254" x2="360" y2="254" stroke="#ef4444" stroke-width="1.5" marker-end="url(#rl)"/>
  <text x="223" y="230" fill="#ef4444" font-size="10" text-anchor="middle">← delete</text>

  <rect x="360" y="238" width="46" height="32" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="406" y="238" width="30" height="32" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="383" y="258" fill="#f8fafc" font-size="13" font-weight="bold" text-anchor="middle">C</text>
  <text x="421" y="258" fill="#475569" font-size="10" text-anchor="middle">∅</text>

  <!-- AFTER delete -->
  <text x="32" y="300" fill="#94a3b8" font-size="11" font-weight="bold">After  (A.next = C — B is unreachable)</text>

  <rect x="32"  y="308" width="46" height="22" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="78"  y="308" width="30" height="22" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="55"  y="323" fill="#f8fafc" font-size="12" font-weight="bold" text-anchor="middle">A</text>
  <text x="93"  y="323" fill="#86efac" font-size="10" text-anchor="middle">●</text>
  <line x1="108" y1="319" x2="200" y2="319" stroke="#86efac" stroke-width="2" marker-end="url(#gl)"/>

  <rect x="200" y="308" width="46" height="22" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="246" y="308" width="30" height="22" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="223" y="323" fill="#f8fafc" font-size="12" font-weight="bold" text-anchor="middle">C</text>
  <text x="261" y="323" fill="#475569" font-size="10" text-anchor="middle">∅</text>

  <text x="310" y="320" fill="#64748b" font-size="11">B will be garbage collected</text>

  <defs>
    <marker id="bl" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7dd3fc"/>
    </marker>
    <marker id="gl" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#86efac"/>
    </marker>
    <marker id="rl" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
