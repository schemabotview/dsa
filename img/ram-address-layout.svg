<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="monospace" font-size="13">
  <!-- Background -->
  <rect width="520" height="340" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="260" y="32" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">RAM — A Long Row of Numbered Slots</text>

  <!-- Column headers -->
  <text x="130" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">Address</text>
  <text x="270" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">Value (byte)</text>
  <text x="400" y="62" fill="#94a3b8" font-size="12" text-anchor="middle">Stored as</text>

  <!-- Rows -->
  <!-- Row 1 - integer bytes highlighted -->
  <rect x="40" y="70" width="440" height="36" fill="#1e293b" rx="4"/>
  <rect x="40" y="70" width="440" height="36" fill="#1e3a5f" rx="4" opacity="0.6"/>
  <text x="130" y="93" fill="#7dd3fc" text-anchor="middle">0x0000</text>
  <text x="270" y="93" fill="#f8fafc" text-anchor="middle">42</text>
  <text x="400" y="93" fill="#94a3b8" text-anchor="middle">int  (part 1 of 4)</text>

  <rect x="40" y="108" width="440" height="36" fill="#1e293b" rx="4" opacity="0.8"/>
  <rect x="40" y="108" width="440" height="36" fill="#1e3a5f" rx="4" opacity="0.4"/>
  <text x="130" y="131" fill="#7dd3fc" text-anchor="middle">0x0001</text>
  <text x="270" y="131" fill="#f8fafc" text-anchor="middle">0</text>
  <text x="400" y="131" fill="#94a3b8" text-anchor="middle">int  (part 2 of 4)</text>

  <rect x="40" y="146" width="440" height="36" fill="#1e293b" rx="4" opacity="0.8"/>
  <rect x="40" y="146" width="440" height="36" fill="#1e3a5f" rx="4" opacity="0.4"/>
  <text x="130" y="169" fill="#7dd3fc" text-anchor="middle">0x0002</text>
  <text x="270" y="169" fill="#f8fafc" text-anchor="middle">0</text>
  <text x="400" y="169" fill="#94a3b8" text-anchor="middle">int  (part 3 of 4)</text>

  <rect x="40" y="184" width="440" height="36" fill="#1e293b" rx="4" opacity="0.8"/>
  <rect x="40" y="184" width="440" height="36" fill="#1e3a5f" rx="4" opacity="0.4"/>
  <text x="130" y="207" fill="#7dd3fc" text-anchor="middle">0x0003</text>
  <text x="270" y="207" fill="#f8fafc" text-anchor="middle">0</text>
  <text x="400" y="207" fill="#94a3b8" text-anchor="middle">int  (part 4 of 4)</text>

  <!-- Row 5 - char -->
  <rect x="40" y="222" width="440" height="36" fill="#1e293b" rx="4" opacity="0.8"/>
  <rect x="40" y="222" width="440" height="36" fill="#14532d" rx="4" opacity="0.5"/>
  <text x="130" y="245" fill="#86efac" text-anchor="middle">0x0004</text>
  <text x="270" y="245" fill="#f8fafc" text-anchor="middle">65</text>
  <text x="400" y="245" fill="#94a3b8" text-anchor="middle">char 'A'  (1 byte)</text>

  <!-- Row 6 - empty -->
  <rect x="40" y="260" width="440" height="36" fill="#1e293b" rx="4" opacity="0.5"/>
  <text x="130" y="283" fill="#475569" text-anchor="middle">0x0005</text>
  <text x="270" y="283" fill="#475569" text-anchor="middle">—</text>
  <text x="400" y="283" fill="#475569" text-anchor="middle">free</text>

  <!-- Legend -->
  <rect x="40" y="308" width="16" height="10" fill="#1e3a5f" rx="2" opacity="0.9"/>
  <text x="62" y="318" fill="#7dd3fc" font-size="11">integer (4 bytes)</text>
  <rect x="180" y="308" width="16" height="10" fill="#14532d" rx="2" opacity="0.8"/>
  <text x="202" y="318" fill="#86efac" font-size="11">char (1 byte)</text>
  <rect x="300" y="308" width="16" height="10" fill="#1e293b" rx="2" opacity="0.7"/>
  <text x="322" y="318" fill="#475569" font-size="11">free slot</text>
</svg>
