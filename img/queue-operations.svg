<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" width="580" height="280" font-family="monospace" font-size="12">
  <rect width="580" height="280" fill="#0f1117" rx="12"/>
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Queue — First In, First Out  (FIFO)</text>

  <!-- Queue container (horizontal) -->
  <!-- top and bottom borders -->
  <line x1="100" y1="80"  x2="480" y2="80"  stroke="#334155" stroke-width="1.5"/>
  <line x1="100" y1="160" x2="480" y2="160" stroke="#334155" stroke-width="1.5"/>
  <!-- left (rear) open, right (front) open -->

  <!-- Elements: enqueued order 10, 30, 50 — 10 is at front (dequeue side) -->
  <!-- rear → front: 50 | 30 | 10 → dequeue -->

  <rect x="100" y="84" width="80" height="72" fill="#14532d" rx="3" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="125" fill="#86efac" font-size="18" font-weight="bold" text-anchor="middle">50</text>
  <text x="140" y="72"  fill="#86efac" font-size="10" text-anchor="middle">last in</text>

  <rect x="184" y="84" width="80" height="72" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="224" y="125" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">30</text>

  <rect x="268" y="84" width="80" height="72" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="308" y="125" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">20</text>

  <rect x="352" y="84" width="80" height="72" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="392" y="125" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">10</text>
  <text x="392" y="72" fill="#f59e0b" font-size="10" text-anchor="middle">first in</text>

  <!-- enqueue arrow (rear — left side) -->
  <line x1="60" y1="120" x2="95" y2="120" stroke="#22c55e" stroke-width="2" marker-end="url(#qgarr)"/>
  <text x="50" y="108" fill="#22c55e" font-size="11" text-anchor="middle">enqueue</text>
  <text x="50" y="120" fill="#22c55e" font-size="11" text-anchor="middle">→ rear</text>

  <!-- dequeue arrow (front — right side) -->
  <line x1="435" y1="120" x2="510" y2="120" stroke="#f59e0b" stroke-width="2" marker-end="url(#qoarr)"/>
  <text x="526" y="108" fill="#f59e0b" font-size="11" text-anchor="middle">dequeue</text>
  <text x="526" y="120" fill="#f59e0b" font-size="11" text-anchor="middle">front →</text>

  <!-- Labels -->
  <text x="140" y="176" fill="#86efac" font-size="10" text-anchor="middle">rear</text>
  <text x="392" y="176" font-size="10" fill="#f59e0b" text-anchor="middle">front</text>

  <!-- Rule callout -->
  <rect x="44" y="196" width="492" height="44" fill="#0d1117" rx="6" stroke="#1e293b" stroke-width="1"/>
  <text x="290" y="216" fill="#e2e8f0" font-size="12" text-anchor="middle">Elements leave in the same order they arrived — 10 was first in, so it is first out.</text>
  <text x="290" y="232" fill="#475569" font-size="11" text-anchor="middle">enqueue / dequeue / peek / is_empty — all O(1)   |   Use deque, not list, for O(1) dequeue</text>

  <!-- Deque section -->
  <text x="290" y="262" fill="#94a3b8" font-size="11" text-anchor="middle">Deque (double-ended queue) — O(1) push and pop from both front and rear</text>

  <defs>
    <marker id="qgarr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="qoarr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
