<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 400" width="560" height="400" font-family="monospace" font-size="13">
  <!-- Background -->
  <rect width="560" height="400" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="280" y="32" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Program Memory Layout</text>

  <!-- STACK column -->
  <text x="140" y="62" fill="#7dd3fc" font-size="13" font-weight="bold" text-anchor="middle">STACK</text>
  <text x="140" y="78" fill="#475569" font-size="11" text-anchor="middle">grows downward ↓</text>

  <!-- Stack frames -->
  <rect x="40" y="88" width="200" height="48" fill="#1e3a5f" rx="6" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="108" fill="#93c5fd" font-size="12" text-anchor="middle" font-weight="bold">main()</text>
  <text x="140" y="126" fill="#64748b" font-size="11" text-anchor="middle">x = 10, y = 20</text>

  <rect x="40" y="144" width="200" height="48" fill="#1e3a5f" rx="6" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="164" fill="#93c5fd" font-size="12" text-anchor="middle" font-weight="bold">add(a, b)</text>
  <text x="140" y="182" fill="#64748b" font-size="11" text-anchor="middle">a = 10, b = 20</text>

  <rect x="40" y="200" width="200" height="48" fill="#1e3a5f" rx="6" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4"/>
  <text x="140" y="228" fill="#475569" font-size="12" text-anchor="middle">(next frame)</text>

  <!-- Stack arrow -->
  <line x1="140" y1="256" x2="140" y2="300" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4"/>
  <polygon points="135,300 145,300 140,310" fill="#3b82f6"/>

  <!-- Stack properties -->
  <text x="140" y="338" fill="#64748b" font-size="11" text-anchor="middle">Fixed size · Auto-managed</text>
  <text x="140" y="354" fill="#64748b" font-size="11" text-anchor="middle">Fast · Short-lived values</text>
  <text x="140" y="370" fill="#64748b" font-size="11" text-anchor="middle">Freed when function returns</text>

  <!-- Divider -->
  <line x1="280" y1="55" x2="280" y2="390" stroke="#334155" stroke-width="1" stroke-dasharray="6"/>

  <!-- HEAP column -->
  <text x="420" y="62" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">HEAP</text>
  <text x="420" y="78" fill="#475569" font-size="11" text-anchor="middle">grows upward ↑ · dynamic</text>

  <!-- Heap objects - scattered -->
  <rect x="310" y="90" width="130" height="44" fill="#14532d" rx="6" stroke="#22c55e" stroke-width="1"/>
  <text x="375" y="108" fill="#86efac" font-size="11" text-anchor="middle" font-weight="bold">Object A</text>
  <text x="375" y="124" fill="#64748b" font-size="10" text-anchor="middle">0x1A00 — 0x1A2C</text>

  <rect x="450" y="150" width="80" height="44" fill="#14532d" rx="6" stroke="#22c55e" stroke-width="1"/>
  <text x="490" y="168" fill="#86efac" font-size="11" text-anchor="middle" font-weight="bold">Node</text>
  <text x="490" y="184" fill="#64748b" font-size="10" text-anchor="middle">0x2F10</text>

  <rect x="310" y="200" width="100" height="44" fill="#14532d" rx="6" stroke="#22c55e" stroke-width="1"/>
  <text x="360" y="218" fill="#86efac" font-size="11" text-anchor="middle" font-weight="bold">Array[5]</text>
  <text x="360" y="234" fill="#64748b" font-size="10" text-anchor="middle">0x3B00</text>

  <rect x="420" y="260" width="90" height="44" fill="#1e293b" rx="6" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <text x="465" y="285" fill="#475569" font-size="11" text-anchor="middle">freed</text>

  <!-- Heap properties -->
  <text x="420" y="338" fill="#64748b" font-size="11" text-anchor="middle">Dynamic size · Manual / GC</text>
  <text x="420" y="354" fill="#64748b" font-size="11" text-anchor="middle">Slower · Long-lived objects</text>
  <text x="420" y="370" fill="#64748b" font-size="11" text-anchor="middle">Freed by GC or explicitly</text>

  <!-- Stack pointer reference arrow from stack to heap -->
  <line x1="240" y1="112" x2="306" y2="112" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="273" y="107" fill="#f59e0b" font-size="10" text-anchor="middle">ref</text>

  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
