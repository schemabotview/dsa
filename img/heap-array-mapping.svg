  <!-- Index arithmetic legend -->
  <rect x="30" y="334" width="520" height="0" fill="none"/>
  <text x="56"  y="335" fill="#475569" font-size="9" text-anchor="middle">root</text>
  <text x="290" y="338" fill="#475569" font-size="10" text-anchor="middle">parent(i) = (i−1)÷2   left(i) = 2i+1   right(i) = 2i+2   ·   heap[0] is always the minimum</text>
</svg>
