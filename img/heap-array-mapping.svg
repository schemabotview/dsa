  <rect x="478" y="296" width="52" height="32" fill="#14532d" stroke="#22c55e" stroke-width="1" rx="3"/>
  <text x="504" y="317" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">10</text>
