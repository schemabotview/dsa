<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" width="580" height="280" font-family="monospace" font-size="12">
  <!-- Background -->
  <rect width="580" height="280" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Array — Contiguous Memory Layout</text>

  <!-- Array cells — 7 elements, each cell 72px wide, starting x=32 -->
  <!-- index labels above -->
  <text x="68"  y="54" fill="#475569" font-size="11" text-anchor="middle">index 0</text>
  <text x="140" y="54" fill="#475569" font-size="11" text-anchor="middle">index 1</text>
  <text x="212" y="54" fill="#475569" font-size="11" text-anchor="middle">index 2</text>
  <text x="284" y="54" fill="#475569" font-size="11" text-anchor="middle">index 3</text>
  <text x="356" y="54" fill="#475569" font-size="11" text-anchor="middle">index 4</text>
  <text x="428" y="54" fill="#475569" font-size="11" text-anchor="middle">index 5</text>
  <text x="500" y="54" fill="#475569" font-size="11" text-anchor="middle">index 6</text>

  <!-- Cells -->
  <rect x="32"  y="62" width="72" height="52" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="104" y="62" width="72" height="52" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="176" y="62" width="72" height="52" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="248" y="62" width="72" height="52" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="320" y="62" width="72" height="52" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="392" y="62" width="72" height="52" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="464" y="62" width="72" height="52" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Values -->
  <text x="68"  y="94" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">10</text>
  <text x="140" y="94" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">30</text>
  <text x="212" y="94" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">50</text>
  <text x="284" y="94" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">20</text>
  <text x="356" y="94" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">40</text>
  <text x="428" y="94" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">70</text>
  <text x="500" y="94" fill="#f8fafc" font-size="18" font-weight="bold" text-anchor="middle">60</text>

  <!-- Memory addresses below cells -->
  <text x="68"  y="128" fill="#22c55e" font-size="10" text-anchor="middle">0x1000</text>
  <text x="140" y="128" fill="#22c55e" font-size="10" text-anchor="middle">0x1004</text>
  <text x="212" y="128" fill="#22c55e" font-size="10" text-anchor="middle">0x1008</text>
  <text x="284" y="128" fill="#22c55e" font-size="10" text-anchor="middle">0x100C</text>
  <text x="356" y="128" fill="#22c55e" font-size="10" text-anchor="middle">0x1010</text>
  <text x="428" y="128" fill="#22c55e" font-size="10" text-anchor="middle">0x1014</text>
  <text x="500" y="128" fill="#22c55e" font-size="10" text-anchor="middle">0x1018</text>

  <!-- Brace / bracket showing "4 bytes each" -->
  <line x1="32"  y1="138" x2="32"  y2="145" stroke="#475569" stroke-width="1"/>
  <line x1="104" y1="138" x2="104" y2="145" stroke="#475569" stroke-width="1"/>
  <line x1="32"  y1="145" x2="104" y2="145" stroke="#475569" stroke-width="1"/>
  <text x="68" y="158" fill="#64748b" font-size="10" text-anchor="middle">4 bytes</text>

  <!-- Formula box -->
  <rect x="32" y="172" width="516" height="48" fill="#0d1117" rx="6" stroke="#1e293b" stroke-width="1"/>
  <text x="290" y="192" fill="#94a3b8" font-size="12" text-anchor="middle">Address of element at index  i  =  base_address  +  i  ×  element_size</text>
  <text x="290" y="212" fill="#475569" font-size="11" text-anchor="middle">e.g.  index 3  =  0x1000  +  3 × 4  =  0x100C     →     O(1) — pure arithmetic, no search</text>

  <!-- Arrow pointing to index 3 cell -->
  <line x1="284" y1="168" x2="284" y2="118" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Label: base address pointer -->
  <text x="68" y="248" fill="#94a3b8" font-size="11">← base address  (only this is stored)</text>
  <line x1="32" y1="240" x2="32" y2="62" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>
</svg>
