  <line x1="318" y1="74" x2="558" y2="74" stroke="#1e293b" stroke-width="1"/>

  <text x="320" y="92" fill="#7dd3fc" font-size="10" font-weight="bold">In-order</text>
  <text x="320" y="106" fill="#475569" font-size="10">Visits nodes in sorted order</text>
  <text x="320" y="118" fill="#475569" font-size="10">when used on a BST. Used to</text>
  <text x="320" y="130" fill="#475569" font-size="10">read keys in ascending order.</text>

  <line x1="318" y1="138" x2="558" y2="138" stroke="#1e293b" stroke-width="1"/>
  <text x="320" y="153" fill="#c084fc" font-size="10" font-weight="bold">Pre-order</text>
  <text x="320" y="167" fill="#475569" font-size="10">Root visited before children.</text>
  <text x="320" y="179" fill="#475569" font-size="10">Used to copy or serialize a tree</text>
  <text x="320" y="191" fill="#475569" font-size="10">(root must be written first).</text>

  <line x1="318" y1="199" x2="558" y2="199" stroke="#1e293b" stroke-width="1"/>
  <text x="320" y="214" fill="#f9a8d4" font-size="10" font-weight="bold">Post-order</text>
  <text x="320" y="228" fill="#475569" font-size="10">Children visited before root.</text>
  <text x="320" y="240" fill="#475569" font-size="10">Used to delete a tree (children</text>
  <text x="320" y="252" fill="#475569" font-size="10">freed before parent) or evaluate</text>
  <text x="320" y="264" fill="#475569" font-size="10">expression trees bottom-up.</text>

  <line x1="318" y1="272" x2="558" y2="272" stroke="#1e293b" stroke-width="1"/>
  <text x="320" y="287" fill="#fbbf24" font-size="10" font-weight="bold">Level-order (BFS)</text>
  <text x="320" y="301" fill="#475569" font-size="10">Visits nodes level by level using</text>
  <text x="320" y="313" fill="#475569" font-size="10">a queue. Used to find shortest</text>
  <text x="320" y="325" fill="#475569" font-size="10">path, serialize by level, or check</text>
  <text x="320" y="337" fill="#475569" font-size="10">completeness of a binary tree.</text>

  <line x1="318" y1="345" x2="558" y2="345" stroke="#1e293b" stroke-width="1"/>
  <text x="438" y="362" fill="#475569" font-size="10" text-anchor="middle">Numbered circles show visit order.</text>
  <text x="438" y="375" fill="#475569" font-size="10" text-anchor="middle">All examples use the same 7-node tree.</text>
