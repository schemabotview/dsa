<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560" height="260" font-family="monospace" font-size="13">
  <!-- Background -->
  <rect width="560" height="260" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="280" y="30" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Value Types vs Reference Types</text>

  <!-- LEFT: Value type -->
  <text x="130" y="60" fill="#7dd3fc" font-size="12" font-weight="bold" text-anchor="middle">Value Type  (e.g. int)</text>

  <!-- variable box -->
  <rect x="40" y="72" width="80" height="36" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1"/>
  <text x="80" y="86" fill="#94a3b8" font-size="10" text-anchor="middle">variable</text>
  <text x="80" y="100" fill="#f8fafc" font-size="12" text-anchor="middle">x</text>

  <!-- value box directly inside -->
  <rect x="140" y="72" width="80" height="36" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="180" y="86" fill="#94a3b8" font-size="10" text-anchor="middle">value</text>
  <text x="180" y="100" fill="#7dd3fc" font-size="13" font-weight="bold" text-anchor="middle">42</text>

  <!-- arrow between -->
  <line x1="120" y1="90" x2="140" y2="90" stroke="#475569" stroke-width="1.5"/>

  <text x="130" y="132" fill="#475569" font-size="11" text-anchor="middle">value lives directly</text>
  <text x="130" y="148" fill="#475569" font-size="11" text-anchor="middle">in the variable slot</text>
  <text x="130" y="164" fill="#475569" font-size="11" text-anchor="middle">(on the stack)</text>

  <!-- copy demo -->
  <text x="130" y="192" fill="#64748b" font-size="11" text-anchor="middle">y = x   →   copy of 42</text>
  <rect x="40" y="200" width="80" height="30" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1"/>
  <text x="80" y="220" fill="#f8fafc" font-size="12" text-anchor="middle">y</text>
  <rect x="140" y="200" width="80" height="30" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="180" y="220" fill="#7dd3fc" font-size="13" font-weight="bold" text-anchor="middle">42</text>
  <line x1="120" y1="215" x2="140" y2="215" stroke="#475569" stroke-width="1.5"/>

  <!-- Divider -->
  <line x1="280" y1="50" x2="280" y2="240" stroke="#334155" stroke-width="1" stroke-dasharray="6"/>

  <!-- RIGHT: Reference type -->
  <text x="420" y="60" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">Reference Type  (e.g. list)</text>

  <!-- variable box -->
  <rect x="300" y="72" width="80" height="36" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1"/>
  <text x="340" y="86" fill="#94a3b8" font-size="10" text-anchor="middle">variable</text>
  <text x="340" y="100" fill="#f8fafc" font-size="12" text-anchor="middle">a</text>

  <!-- address inside variable -->
  <rect x="400" y="72" width="80" height="36" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1"/>
  <text x="440" y="86" fill="#94a3b8" font-size="10" text-anchor="middle">address</text>
  <text x="440" y="100" fill="#f59e0b" font-size="11" text-anchor="middle">0x3B00</text>

  <!-- arrow to heap object -->
  <line x1="480" y1="90" x2="510" y2="90" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#harrow)"/>

  <!-- heap object -->
  <rect x="510" y="72" width="36" height="36" fill="#14532d" rx="4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="528" y="86" fill="#86efac" font-size="10" text-anchor="middle">heap</text>
  <text x="528" y="100" fill="#86efac" font-size="10" text-anchor="middle">[1,2]</text>

  <text x="420" y="132" fill="#475569" font-size="11" text-anchor="middle">variable holds an address</text>
  <text x="420" y="148" fill="#475569" font-size="11" text-anchor="middle">that points to the object</text>
  <text x="420" y="164" fill="#475569" font-size="11" text-anchor="middle">(object lives on heap)</text>

  <!-- copy demo -->
  <text x="420" y="192" fill="#64748b" font-size="11" text-anchor="middle">b = a   →   copy of address</text>
  <rect x="300" y="200" width="80" height="30" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1"/>
  <text x="340" y="220" fill="#f8fafc" font-size="12" text-anchor="middle">b</text>
  <rect x="400" y="200" width="80" height="30" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1"/>
  <text x="440" y="220" fill="#f59e0b" font-size="11" text-anchor="middle">0x3B00</text>
  <line x1="480" y1="215" x2="510" y2="100" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4" marker-end="url(#harrow)"/>

  <defs>
    <marker id="harrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
