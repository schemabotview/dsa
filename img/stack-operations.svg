<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 320" width="580" height="320" font-family="monospace" font-size="12">
  <rect width="580" height="320" fill="#0f1117" rx="12"/>
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Stack — Last In, First Out  (LIFO)</text>

  <!-- LEFT: push sequence -->
  <text x="130" y="54" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">push(10) → push(30) → push(50)</text>

  <!-- Stack container outline -->
  <rect x="90"  y="66"  width="80" height="200" fill="none" rx="4" stroke="#334155" stroke-width="1.5"/>
  <!-- open top indicated by gap -->
  <line x1="90"  y1="66"  x2="90"  y2="266" stroke="#334155" stroke-width="1.5"/>
  <line x1="170" y1="66"  x2="170" y2="266" stroke="#334155" stroke-width="1.5"/>
  <line x1="90"  y1="266" x2="170" y2="266" stroke="#334155" stroke-width="1.5"/>
  <text x="130" y="80" fill="#475569" font-size="10" text-anchor="middle">↑ open top</text>

  <!-- Elements in stack (bottom to top: 10, 30, 50) -->
  <rect x="94"  y="200" width="72" height="36" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="223" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">10</text>
  <text x="176" y="223" fill="#475569" font-size="10">← bottom</text>

  <rect x="94"  y="160" width="72" height="36" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="183" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">30</text>

  <rect x="94"  y="120" width="72" height="36" fill="#14532d" rx="3" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="143" fill="#86efac" font-size="14" font-weight="bold" text-anchor="middle">50</text>
  <text x="176" y="143" fill="#86efac" font-size="10">← top  (peek)</text>

  <!-- push arrow -->
  <line x1="130" y1="112" x2="130" y2="92" stroke="#22c55e" stroke-width="2" marker-end="url(#garr)"/>
  <text x="130" y="108" fill="#22c55e" font-size="10" text-anchor="middle">push ↓</text>

  <!-- RIGHT: pop sequence -->
  <text x="420" y="54" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">pop() returns 50, then 30</text>

  <!-- Stack container outline -->
  <line x1="380" y1="66"  x2="380" y2="266" stroke="#334155" stroke-width="1.5"/>
  <line x1="460" y1="66"  x2="460" y2="266" stroke="#334155" stroke-width="1.5"/>
  <line x1="380" y1="266" x2="460" y2="266" stroke="#334155" stroke-width="1.5"/>

  <!-- pop → 50 is being removed -->
  <rect x="384" y="120" width="72" height="36" fill="#7f1d1d" rx="3" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <text x="420" y="143" fill="#fca5a5" font-size="14" font-weight="bold" text-anchor="middle">50</text>
  <!-- pop arrow up -->
  <line x1="420" y1="112" x2="420" y2="78" stroke="#ef4444" stroke-width="2" marker-end="url(#rarr)"/>
  <text x="500" y="100" fill="#ef4444" font-size="10">pop() = 50</text>

  <rect x="384" y="160" width="72" height="36" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="420" y="183" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">30</text>
  <text x="466" y="175" fill="#86efac" font-size="10">← new top</text>

  <rect x="384" y="200" width="72" height="36" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="420" y="223" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">10</text>

  <!-- Divider -->
  <line x1="290" y1="50" x2="290" y2="280" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>

  <!-- Operations table -->
  <rect x="44" y="278" width="492" height="30" fill="#0d1117" rx="4"/>
  <text x="290" y="284" fill="none" font-size="1">spacer</text>
  <text x="100" y="298" fill="#94a3b8" font-size="11" text-anchor="middle">push(x)</text>
  <text x="100" y="310" fill="#64748b" font-size="10" text-anchor="middle">O(1)</text>
  <text x="210" y="298" fill="#94a3b8" font-size="11" text-anchor="middle">pop()</text>
  <text x="210" y="310" fill="#64748b" font-size="10" text-anchor="middle">O(1)</text>
  <text x="315" y="298" fill="#94a3b8" font-size="11" text-anchor="middle">peek()</text>
  <text x="315" y="310" fill="#64748b" font-size="10" text-anchor="middle">O(1)</text>
  <text x="420" y="298" fill="#94a3b8" font-size="11" text-anchor="middle">is_empty()</text>
  <text x="420" y="310" fill="#64748b" font-size="10" text-anchor="middle">O(1)</text>
  <text x="526" y="298" fill="#94a3b8" font-size="11" text-anchor="middle">search</text>
  <text x="526" y="310" fill="#64748b" font-size="10" text-anchor="middle">O(n)</text>

  <defs>
    <marker id="garr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/>
    </marker>
    <marker id="rarr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
