<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" width="580" height="300" font-family="monospace" font-size="12">
  <rect width="580" height="300" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Singly Linked List — Nodes Connected by Pointers</text>

  <!-- HEAD label -->
  <text x="44" y="56" fill="#f59e0b" font-size="11" text-anchor="middle">head</text>
  <line x1="44" y1="60" x2="44" y2="74" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#harrow)"/>

  <!-- Node 1: value=10 -->
  <rect x="20"  y="78" width="50" height="36" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="70"  y="78" width="36" height="36" fill="#0f2942" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="45"  y="100" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">10</text>
  <text x="88"  y="91"  fill="#64748b" font-size="8"  text-anchor="middle">next</text>
  <text x="88"  y="104" fill="#7dd3fc" font-size="10" text-anchor="middle">●</text>
  <!-- arrow to next node -->
  <line x1="106" y1="96" x2="130" y2="96" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#barrow)"/>

  <!-- Node 2: value=30 -->
  <rect x="130" y="78" width="50" height="36" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="180" y="78" width="36" height="36" fill="#0f2942" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="155" y="100" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">30</text>
  <text x="198" y="91"  fill="#64748b" font-size="8"  text-anchor="middle">next</text>
  <text x="198" y="104" fill="#7dd3fc" font-size="10" text-anchor="middle">●</text>
  <line x1="216" y1="96" x2="240" y2="96" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#barrow)"/>

  <!-- Node 3: value=50 -->
  <rect x="240" y="78" width="50" height="36" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="290" y="78" width="36" height="36" fill="#0f2942" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="265" y="100" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">50</text>
  <text x="308" y="91"  fill="#64748b" font-size="8"  text-anchor="middle">next</text>
  <text x="308" y="104" fill="#7dd3fc" font-size="10" text-anchor="middle">●</text>
  <line x1="326" y1="96" x2="350" y2="96" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#barrow)"/>

  <!-- Node 4: value=20 -->
  <rect x="350" y="78" width="50" height="36" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="400" y="78" width="36" height="36" fill="#0f2942" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="375" y="100" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">20</text>
  <text x="418" y="91"  fill="#64748b" font-size="8"  text-anchor="middle">next</text>
  <text x="418" y="104" fill="#7dd3fc" font-size="10" text-anchor="middle">●</text>
  <line x1="436" y1="96" x2="460" y2="96" stroke="#7dd3fc" stroke-width="1.5" marker-end="url(#barrow)"/>

  <!-- Node 5: value=40 (tail) -->
  <rect x="460" y="78" width="50" height="36" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="510" y="78" width="36" height="36" fill="#0f2942" rx="4" stroke="#3b82f6" stroke-width="1"/>
  <text x="485" y="100" fill="#f8fafc" font-size="14" font-weight="bold" text-anchor="middle">40</text>
  <text x="528" y="91"  fill="#64748b" font-size="8"  text-anchor="middle">next</text>
  <text x="528" y="104" fill="#475569" font-size="10" text-anchor="middle">∅</text>

  <!-- TAIL label -->
  <text x="485" y="128" fill="#f59e0b" font-size="11" text-anchor="middle">tail</text>

  <!-- Node anatomy callout -->
  <rect x="20" y="152" width="248" height="80" fill="#0d1117" rx="6" stroke="#1e293b" stroke-width="1"/>
  <text x="144" y="170" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">Node anatomy</text>
  <rect x="32"  y="180" width="50" height="32" fill="#1e3a5f" rx="3" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="82"  y="180" width="36" height="32" fill="#0f2942" rx="3" stroke="#3b82f6" stroke-width="1"/>
  <text x="57"  y="200" fill="#f8fafc" font-size="12" font-weight="bold" text-anchor="middle">val</text>
  <text x="100" y="198" fill="#64748b" font-size="9"  text-anchor="middle">next</text>
  <line x1="132" y1="149" x2="228" y2="149" stroke="none"/>
  <text x="130" y="192" fill="#7dd3fc" font-size="11">← value</text>
  <text x="130" y="208" fill="#7dd3fc" font-size="11">← pointer to next</text>

  <!-- Contrast with array -->
  <rect x="284" y="152" width="276" height="80" fill="#0d1117" rx="6" stroke="#1e293b" stroke-width="1"/>
  <text x="422" y="170" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">vs Array</text>

  <text x="296" y="188" fill="#475569" font-size="11">Array:  contiguous, index = O(1)</text>
  <text x="296" y="204" fill="#475569" font-size="11">         insert/delete = O(n)  (shift)</text>
  <text x="296" y="220" fill="#86efac" font-size="11">List:   scattered, index = O(n)</text>
  <text x="296" y="236" fill="#86efac" font-size="11">         insert/delete = O(1)  (rewire)</text>

  <!-- Memory addresses — scattered -->
  <text x="44"  y="144" fill="#22c55e" font-size="9" text-anchor="middle">0x1A00</text>
  <text x="155" y="144" fill="#22c55e" font-size="9" text-anchor="middle">0x3F20</text>
  <text x="265" y="144" fill="#22c55e" font-size="9" text-anchor="middle">0x2B08</text>
  <text x="375" y="144" fill="#22c55e" font-size="9" text-anchor="middle">0x5C44</text>
  <text x="485" y="144" fill="#22c55e" font-size="9" text-anchor="middle">0x4D10</text>
  <text x="290" y="144" fill="#475569" font-size="9" text-anchor="middle">← addresses are scattered anywhere in heap</text>

  <defs>
    <marker id="harrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
    <marker id="barrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
</svg>
