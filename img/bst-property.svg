<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 340" width="580" height="340" font-family="monospace" font-size="12">
  <rect width="580" height="340" fill="#0f1117" rx="12"/>
  <text x="290" y="26" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Binary Search Tree — Ordering Property</text>

  <!-- Shaded regions -->
  <rect x="24" y="44" width="236" height="250" fill="#0d2a1a" rx="8" stroke="#166534" stroke-width="1" stroke-dasharray="4"/>
  <rect x="320" y="44" width="236" height="250" fill="#1a0d2a" rx="8" stroke="#6b21a8" stroke-width="1" stroke-dasharray="4"/>
  <text x="142" y="60" fill="#22c55e" font-size="10" text-anchor="middle">all values &lt; 8</text>
  <text x="438" y="60" fill="#a855f7" font-size="10" text-anchor="middle">all values &gt; 8</text>

  <!-- Edges -->
  <line x1="290" y1="102" x2="162" y2="142" stroke="#475569" stroke-width="1.5"/>
  <line x1="290" y1="102" x2="418" y2="142" stroke="#475569" stroke-width="1.5"/>

  <line x1="162" y1="162" x2="96"  y2="202" stroke="#475569" stroke-width="1.5"/>
  <line x1="162" y1="162" x2="228" y2="202" stroke="#475569" stroke-width="1.5"/>

  <line x1="418" y1="162" x2="384" y2="202" stroke="#475569" stroke-width="1.5"/>
  <line x1="418" y1="162" x2="484" y2="202" stroke="#475569" stroke-width="1.5"/>

  <line x1="228" y1="222" x2="200" y2="262" stroke="#475569" stroke-width="1.5"/>
  <line x1="228" y1="222" x2="256" y2="262" stroke="#475569" stroke-width="1.5"/>

  <line x1="484" y1="222" x2="456" y2="262" stroke="#475569" stroke-width="1.5"/>

  <!-- Root: 8 -->
  <circle cx="290" cy="88" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="94" fill="#7dd3fc" font-size="14" font-weight="bold" text-anchor="middle">8</text>

  <!-- Level 1 -->
  <circle cx="162" cy="152" r="20" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="162" y="158" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">3</text>

  <circle cx="418" cy="152" r="20" fill="#3b1f6b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="418" y="158" fill="#c084fc" font-size="13" font-weight="bold" text-anchor="middle">10</text>

  <!-- Level 2 -->
  <circle cx="96"  cy="212" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="96"  y="218" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">1</text>

  <circle cx="228" cy="212" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="228" y="218" fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">6</text>

  <circle cx="384" cy="212" r="18" fill="#3b1f6b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="384" y="218" fill="#c084fc" font-size="13" font-weight="bold" text-anchor="middle">9</text>

  <circle cx="484" cy="212" r="18" fill="#3b1f6b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="484" y="218" fill="#c084fc" font-size="13" font-weight="bold" text-anchor="middle">14</text>

  <!-- Level 3 -->
  <circle cx="200" cy="272" r="16" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="200" y="278" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">4</text>

  <circle cx="256" cy="272" r="16" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="256" y="278" fill="#86efac" font-size="12" font-weight="bold" text-anchor="middle">7</text>

  <circle cx="456" cy="272" r="16" fill="#3b1f6b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="456" y="278" fill="#c084fc" font-size="12" font-weight="bold" text-anchor="middle">13</text>

  <!-- BST rule annotation -->
  <text x="290" y="316" fill="#475569" font-size="10" text-anchor="middle">For every node N:  all values in left subtree &lt; N  &lt;  all values in right subtree</text>
  <text x="290" y="330" fill="#475569" font-size="10" text-anchor="middle">In-order traversal (1 3 4 6 7 8 9 10 13 14) visits nodes in sorted ascending order</text>
</svg>
