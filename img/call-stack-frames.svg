<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" width="580" height="360" font-family="monospace" font-size="12">
  <rect width="580" height="360" fill="#0f1117" rx="12"/>
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Call Stack — factorial(4) Growing and Unwinding</text>

  <!-- LEFT: stack growing -->
  <text x="130" y="52" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">① Stack grows ↓ (calls)</text>

  <!-- frame 4 — outermost call, bottom of stack -->
  <rect x="30" y="260" width="200" height="44" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1.5"/>
  <text x="130" y="278" fill="#94a3b8" font-size="11" text-anchor="middle">factorial(4)</text>
  <text x="130" y="296" fill="#475569" font-size="10" text-anchor="middle">waiting for factorial(3)</text>

  <!-- frame 3 -->
  <rect x="30" y="212" width="200" height="44" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1.5"/>
  <text x="130" y="230" fill="#94a3b8" font-size="11" text-anchor="middle">factorial(3)</text>
  <text x="130" y="248" fill="#475569" font-size="10" text-anchor="middle">waiting for factorial(2)</text>

  <!-- frame 2 -->
  <rect x="30" y="164" width="200" height="44" fill="#1e293b" rx="4" stroke="#475569" stroke-width="1.5"/>
  <text x="130" y="182" fill="#94a3b8" font-size="11" text-anchor="middle">factorial(2)</text>
  <text x="130" y="200" fill="#475569" font-size="10" text-anchor="middle">waiting for factorial(1)</text>

  <!-- frame 1 — top of stack, base case hit -->
  <rect x="30" y="116" width="200" height="44" fill="#14532d" rx="4" stroke="#22c55e" stroke-width="2"/>
  <text x="130" y="134" fill="#86efac" font-size="11" text-anchor="middle">factorial(1)</text>
  <text x="130" y="152" fill="#86efac" font-size="10" text-anchor="middle">base case → return 1</text>

  <!-- stack floor -->
  <line x1="30" y1="308" x2="230" y2="308" stroke="#334155" stroke-width="2"/>
  <text x="130" y="324" fill="#475569" font-size="10" text-anchor="middle">stack bottom</text>

  <!-- call arrows left side -->
  <text x="130" y="108" fill="#7dd3fc" font-size="10" text-anchor="middle">calls factorial(1) ↑</text>
  <text x="130" y="156" fill="#64748b" font-size="10" text-anchor="middle">calls factorial(2) ↑</text>

  <!-- divider -->
  <line x1="290" y1="48" x2="290" y2="345" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>

  <!-- RIGHT: stack unwinding -->
  <text x="435" y="52" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">② Stack unwinds ↑ (returns)</text>

  <!-- frame 1 — pops first, returns 1 -->
  <rect x="340" y="116" width="200" height="44" fill="#7f1d1d" rx="4" stroke="#ef4444" stroke-width="1.5" opacity="0.6"/>
  <text x="440" y="134" fill="#fca5a5" font-size="11" text-anchor="middle">factorial(1)  ← popped</text>
  <text x="440" y="152" fill="#fca5a5" font-size="10" text-anchor="middle">returned 1</text>

  <!-- frame 2 — gets 1, returns 2×1=2 -->
  <rect x="340" y="164" width="200" height="44" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="182" fill="#93c5fd" font-size="11" text-anchor="middle">factorial(2)</text>
  <text x="440" y="200" fill="#93c5fd" font-size="10" text-anchor="middle">2 × 1 = 2  → return 2</text>

  <!-- frame 3 — gets 2, returns 3×2=6 -->
  <rect x="340" y="212" width="200" height="44" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="440" y="230" fill="#93c5fd" font-size="11" text-anchor="middle">factorial(3)</text>
  <text x="440" y="248" fill="#93c5fd" font-size="10" text-anchor="middle">3 × 2 = 6  → return 6</text>

  <!-- frame 4 — gets 6, returns 4×6=24 -->
  <rect x="340" y="260" width="200" height="44" fill="#14532d" rx="4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="440" y="278" fill="#86efac" font-size="11" text-anchor="middle">factorial(4)</text>
  <text x="440" y="296" fill="#86efac" font-size="10" text-anchor="middle">4 × 6 = 24  → return 24</text>

  <line x1="340" y1="308" x2="540" y2="308" stroke="#334155" stroke-width="2"/>
  <text x="440" y="324" fill="#475569" font-size="10" text-anchor="middle">final answer: 24</text>

  <!-- return arrows right side -->
  <text x="440" y="108" fill="#f59e0b" font-size="10" text-anchor="middle">↓ return 1</text>
  <text x="440" y="156" fill="#f59e0b" font-size="10" text-anchor="middle">↓ return 2</text>
  <text x="440" y="204" fill="#f59e0b" font-size="10" text-anchor="middle">↓ return 6</text>

  <!-- bottom note -->
  <rect x="30" y="338" width="520" height="18" fill="#0d1117" rx="3"/>
  <text x="290" y="351" fill="#475569" font-size="10" text-anchor="middle">Each frame stores: function arguments, local variables, return address. Frame is freed when the function returns.</text>
</svg>
