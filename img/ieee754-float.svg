<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 220" width="580" height="220" font-family="monospace" font-size="12">
  <!-- Background -->
  <rect width="580" height="220" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">32-bit Float — IEEE 754 Layout</text>

  <!-- Bit layout: 32 bits total, each bit cell = 16px wide, starting x=20 -->
  <!-- Total width = 32 * 16 = 512px, centered: start at (580-512)/2 = 34 -->

  <!-- Sign bit (bit 31) — 1 bit -->
  <rect x="34"  y="50" width="16"  height="40" fill="#7f1d1d" rx="2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="42"  y="74" fill="#fca5a5" font-size="9" text-anchor="middle">1</text>

  <!-- Exponent (bits 30-23) — 8 bits -->
  <rect x="50"  y="50" width="128" height="40" fill="#1e3a5f" rx="2" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- individual bit dividers -->
  <line x1="66"  y1="50" x2="66"  y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="82"  y1="50" x2="82"  y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="98"  y1="50" x2="98"  y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="114" y1="50" x2="114" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="130" y1="50" x2="130" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="146" y1="50" x2="146" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="162" y1="50" x2="162" y2="90" stroke="#0f1117" stroke-width="1"/>
  <text x="114" y="74" fill="#93c5fd" font-size="10" text-anchor="middle">exponent</text>

  <!-- Mantissa (bits 22-0) — 23 bits -->
  <rect x="178" y="50" width="368" height="40" fill="#14532d" rx="2" stroke="#22c55e" stroke-width="1.5"/>
  <!-- show a few dividers -->
  <line x1="194" y1="50" x2="194" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="210" y1="50" x2="210" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="226" y1="50" x2="226" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="242" y1="50" x2="242" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="258" y1="50" x2="258" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="274" y1="50" x2="274" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="290" y1="50" x2="290" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="306" y1="50" x2="306" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="322" y1="50" x2="322" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="338" y1="50" x2="338" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="354" y1="50" x2="354" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="370" y1="50" x2="370" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="386" y1="50" x2="386" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="402" y1="50" x2="402" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="418" y1="50" x2="418" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="434" y1="50" x2="434" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="450" y1="50" x2="450" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="466" y1="50" x2="466" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="482" y1="50" x2="482" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="498" y1="50" x2="498" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="514" y1="50" x2="514" y2="90" stroke="#0f1117" stroke-width="1"/>
  <line x1="530" y1="50" x2="530" y2="90" stroke="#0f1117" stroke-width="1"/>
  <text x="362" y="74" fill="#86efac" font-size="10" text-anchor="middle">mantissa  (fraction)</text>

  <!-- Bit count labels below -->
  <text x="42"  y="106" fill="#fca5a5" font-size="10" text-anchor="middle">1 bit</text>
  <text x="114" y="106" fill="#93c5fd" font-size="10" text-anchor="middle">8 bits</text>
  <text x="362" y="106" fill="#86efac" font-size="10" text-anchor="middle">23 bits</text>

  <!-- Bracket lines -->
  <line x1="34"  y1="96" x2="34"  y2="100" stroke="#fca5a5" stroke-width="1"/>
  <line x1="50"  y1="96" x2="50"  y2="100" stroke="#fca5a5" stroke-width="1"/>
  <line x1="34"  y1="100" x2="50"  y2="100" stroke="#fca5a5" stroke-width="1"/>

  <line x1="50"  y1="96" x2="50"  y2="100" stroke="#93c5fd" stroke-width="1"/>
  <line x1="178" y1="96" x2="178" y2="100" stroke="#93c5fd" stroke-width="1"/>
  <line x1="50"  y1="100" x2="178" y2="100" stroke="#93c5fd" stroke-width="1"/>

  <line x1="178" y1="96" x2="178" y2="100" stroke="#86efac" stroke-width="1"/>
  <line x1="546" y1="96" x2="546" y2="100" stroke="#86efac" stroke-width="1"/>
  <line x1="178" y1="100" x2="546" y2="100" stroke="#86efac" stroke-width="1"/>

  <!-- Bit position labels -->
  <text x="42"  y="44" fill="#475569" font-size="9" text-anchor="middle">31</text>
  <text x="114" y="44" fill="#475569" font-size="9" text-anchor="middle">30 — 23</text>
  <text x="362" y="44" fill="#475569" font-size="9" text-anchor="middle">22 — 0</text>

  <!-- Legend / explanation -->
  <rect x="34" y="122" width="512" height="76" fill="#0d1117" rx="6" stroke="#1e293b" stroke-width="1"/>

  <rect x="46" y="134" width="10" height="10" fill="#7f1d1d" rx="1" stroke="#ef4444" stroke-width="1"/>
  <text x="62" y="144" fill="#e2e8f0" font-size="11">Sign bit — 0 means positive, 1 means negative</text>

  <rect x="46" y="152" width="10" height="10" fill="#1e3a5f" rx="1" stroke="#3b82f6" stroke-width="1"/>
  <text x="62" y="162" fill="#e2e8f0" font-size="11">Exponent — 8 bits encode the scale (power of 2), biased by 127</text>

  <rect x="46" y="170" width="10" height="10" fill="#14532d" rx="1" stroke="#22c55e" stroke-width="1"/>
  <text x="62" y="180" fill="#e2e8f0" font-size="11">Mantissa — 23 bits store the significant digits of the value</text>
</svg>
