<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" width="580" height="300" font-family="monospace" font-size="12">
  <rect width="580" height="300" fill="#0f1117" rx="12"/>
  <text x="290" y="24" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">Heap Insert — Sift Up to Restore Heap Property</text>

  <!-- ── STEP 1: insert 2 as last leaf ── -->
  <text x="100" y="46" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">① Append new value (2) at end</text>

  <line x1="100" y1="82"  x2="58"  y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="100" y1="82"  x2="142" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="58"  y1="133" x2="37"  y2="163" stroke="#475569" stroke-width="1.5"/>
  <line x1="58"  y1="133" x2="79"  y2="163" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3"/>

  <circle cx="100" cy="68"  r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="74"  fill="#7dd3fc" font-size="13" font-weight="bold" text-anchor="middle">5</text>
  <circle cx="58"  cy="128" r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="58"  y="134" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">8</text>
  <circle cx="142" cy="128" r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="142" y="134" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">9</text>
  <circle cx="37"  cy="175" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="37"  y="180" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">10</text>
  <!-- new node -->
  <circle cx="79"  cy="175" r="14" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
  <text x="79"  y="180" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle">2</text>
  <text x="100" y="200" fill="#f59e0b" font-size="9" text-anchor="middle">2 &lt; 8 → swap!</text>

  <!-- ── STEP 2: sift up once ── -->
  <line x1="193" y1="44" x2="193" y2="290" stroke="#1e293b" stroke-width="1" stroke-dasharray="3"/>
  <text x="290" y="46" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">② Swap with parent (2 &lt; 8)</text>

  <line x1="290" y1="82"  x2="248" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="290" y1="82"  x2="332" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="248" y1="133" x2="227" y2="163" stroke="#475569" stroke-width="1.5"/>
  <line x1="248" y1="133" x2="269" y2="163" stroke="#475569" stroke-width="1.5"/>

  <circle cx="290" cy="68"  r="18" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="290" y="74"  fill="#7dd3fc" font-size="13" font-weight="bold" text-anchor="middle">5</text>
  <circle cx="248" cy="128" r="16" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
  <text x="248" y="134" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="332" cy="128" r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="332" y="134" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">9</text>
  <circle cx="227" cy="175" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="227" y="180" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">10</text>
  <circle cx="269" cy="175" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="269" y="180" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">8</text>
  <text x="290" y="200" fill="#f59e0b" font-size="9" text-anchor="middle">2 &lt; 5 → swap again!</text>

  <!-- ── STEP 3: sift up to root ── -->
  <line x1="387" y1="44" x2="387" y2="290" stroke="#1e293b" stroke-width="1" stroke-dasharray="3"/>
  <text x="484" y="46" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">③ Swap with root (2 &lt; 5)</text>

  <line x1="484" y1="82"  x2="442" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="484" y1="82"  x2="526" y2="118" stroke="#475569" stroke-width="1.5"/>
  <line x1="442" y1="133" x2="421" y2="163" stroke="#475569" stroke-width="1.5"/>
  <line x1="442" y1="133" x2="463" y2="163" stroke="#475569" stroke-width="1.5"/>

  <circle cx="484" cy="68"  r="18" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="484" y="74"  fill="#86efac" font-size="13" font-weight="bold" text-anchor="middle">2</text>
  <circle cx="442" cy="128" r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="442" y="134" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">5</text>
  <circle cx="526" cy="128" r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="526" y="134" fill="#94a3b8" font-size="12" font-weight="bold" text-anchor="middle">9</text>
  <circle cx="421" cy="175" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="421" y="180" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">10</text>
  <circle cx="463" cy="175" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="463" y="180" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">8</text>
  <text x="484" y="200" fill="#22c55e" font-size="9" text-anchor="middle">2 is root — heap restored ✓</text>

  <!-- bottom note -->
  <rect x="20" y="216" width="540" height="36" fill="#0d1117" rx="4" stroke="#1e293b" stroke-width="1"/>
  <text x="290" y="231" fill="#475569" font-size="10" text-anchor="middle">Sift-up: compare inserted node with its parent. If smaller, swap. Repeat until heap property holds.</text>
  <text x="290" y="246" fill="#475569" font-size="10" text-anchor="middle">At most O(log n) swaps — one per level. Extract-min is the reverse: swap root with last leaf, then sift down.</text>
</svg>
