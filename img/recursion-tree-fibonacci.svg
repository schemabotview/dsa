<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 320" width="580" height="320" font-family="monospace" font-size="12">
  <rect width="580" height="320" fill="#0f1117" rx="12"/>
  <text x="290" y="26" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Recursion Tree — fib(5)  Overlapping Subproblems</text>

  <!-- Helper: node = circle + label -->
  <!-- Level 0: fib(5) -->
  <circle cx="290" cy="58" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="290" y="63" fill="#7dd3fc" font-size="12" font-weight="bold" text-anchor="middle">fib(5)</text>

  <!-- Level 1: fib(4), fib(3) -->
  <line x1="272" y1="72" x2="178" y2="108" stroke="#475569" stroke-width="1.5"/>
  <line x1="308" y1="72" x2="402" y2="108" stroke="#475569" stroke-width="1.5"/>

  <circle cx="165" cy="120" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="165" y="125" fill="#7dd3fc" font-size="12" font-weight="bold" text-anchor="middle">fib(4)</text>

  <circle cx="415" cy="120" r="22" fill="#3b1f6b" stroke="#a855f7" stroke-width="2"/>
  <text x="415" y="125" fill="#c084fc" font-size="12" font-weight="bold" text-anchor="middle">fib(3)</text>
  <text x="460" y="118" fill="#a855f7" font-size="9">①</text>

  <!-- Level 2: fib(3), fib(2), fib(2), fib(1) -->
  <line x1="147" y1="134" x2="96"  y2="170" stroke="#475569" stroke-width="1.5"/>
  <line x1="183" y1="134" x2="234" y2="170" stroke="#475569" stroke-width="1.5"/>
  <line x1="397" y1="134" x2="356" y2="170" stroke="#475569" stroke-width="1.5"/>
  <line x1="433" y1="134" x2="484" y2="170" stroke="#475569" stroke-width="1.5"/>

  <circle cx="84"  cy="182" r="22" fill="#3b1f6b" stroke="#a855f7" stroke-width="2"/>
  <text x="84"  y="187" fill="#c084fc" font-size="12" font-weight="bold" text-anchor="middle">fib(3)</text>
  <text x="52"  y="180" fill="#a855f7" font-size="9">②</text>

  <circle cx="246" cy="182" r="22" fill="#4a1d3f" stroke="#ec4899" stroke-width="2"/>
  <text x="246" y="187" fill="#f9a8d4" font-size="12" font-weight="bold" text-anchor="middle">fib(2)</text>
  <text x="276" y="180" fill="#ec4899" font-size="9">①</text>

  <circle cx="344" cy="182" r="22" fill="#4a1d3f" stroke="#ec4899" stroke-width="2"/>
  <text x="344" y="187" fill="#f9a8d4" font-size="12" font-weight="bold" text-anchor="middle">fib(2)</text>
  <text x="374" y="180" fill="#ec4899" font-size="9">②</text>

  <circle cx="496" cy="182" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="496" y="187" fill="#86efac" font-size="11" font-weight="bold" text-anchor="middle">fib(1)</text>

  <!-- Level 3 -->
  <line x1="66"  y1="196" x2="42"  y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="102" y1="196" x2="126" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="228" y1="196" x2="204" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="264" y1="196" x2="288" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="326" y1="196" x2="302" y2="230" stroke="#475569" stroke-width="1.5"/>
  <line x1="362" y1="196" x2="386" y2="230" stroke="#475569" stroke-width="1.5"/>

  <!-- fib(2) ③, fib(1), fib(1), fib(0), fib(1), fib(0) -->
  <circle cx="42"  cy="242" r="18" fill="#4a1d3f" stroke="#ec4899" stroke-width="1.5"/>
  <text x="42"  y="247" fill="#f9a8d4" font-size="10" font-weight="bold" text-anchor="middle">fib(2)</text>
  <text x="20"  y="242" fill="#ec4899" font-size="8">③</text>

  <circle cx="126" cy="242" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="126" y="247" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">fib(1)</text>

  <circle cx="204" cy="242" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="204" y="247" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">fib(1)</text>

  <circle cx="288" cy="242" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="288" y="247" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">fib(0)</text>

  <circle cx="302" cy="242" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="302" y="247" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">fib(1)</text>

  <circle cx="386" cy="242" r="18" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="386" y="247" fill="#86efac" font-size="10" font-weight="bold" text-anchor="middle">fib(0)</text>

  <!-- Level 4 for fib(2)③ -->
  <line x1="32"  y1="258" x2="22"  y2="280" stroke="#475569" stroke-width="1"/>
  <line x1="52"  y1="258" x2="62"  y2="280" stroke="#475569" stroke-width="1"/>
  <circle cx="18"  cy="290" r="14" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="18"  cy="295" fill="#86efac" font-size="9" text-anchor="middle" y="294">f(1)</text>
  <circle cx="66"  cy="290" r="14" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="66"  y="294" fill="#86efac" font-size="9" text-anchor="middle">f(0)</text>

  <!-- Legend -->
  <rect x="420" y="252" width="148" height="56" fill="#0d1117" rx="4" stroke="#1e293b" stroke-width="1"/>
  <circle cx="434" cy="266" r="7" fill="#3b1f6b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="446" y="270" fill="#c084fc" font-size="10">fib(3) computed 2×</text>
  <circle cx="434" cy="284" r="7" fill="#4a1d3f" stroke="#ec4899" stroke-width="1.5"/>
  <text x="446" y="288" fill="#f9a8d4" font-size="10">fib(2) computed 3×</text>
  <circle cx="434" cy="300" r="7" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="446" y="304" fill="#86efac" font-size="10">base case (fib 0 or 1)</text>

  <text x="290" y="310" fill="#475569" font-size="10" text-anchor="middle">Naive recursion: O(2ⁿ) calls. Memoization reduces this to O(n) by caching results.</text>
</svg>
