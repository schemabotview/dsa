<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" width="580" height="300" font-family="monospace" font-size="12">
  <!-- Background -->
  <rect width="580" height="300" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">Inserting at Index 2 — Elements Must Shift Right</text>

  <!-- === BEFORE === -->
  <text x="32" y="58" fill="#94a3b8" font-size="12" font-weight="bold">Before  insert(2, 99)</text>

  <!-- 5 cells before, cell width=88, start x=32 -->
  <rect x="32"  y="66" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="120" y="66" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="208" y="66" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="296" y="66" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="384" y="66" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="472" y="66" width="88" height="46" fill="#1e293b" rx="4" stroke="#334155" stroke-width="1" stroke-dasharray="4"/>

  <text x="76"  y="95" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">10</text>
  <text x="164" y="95" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">30</text>
  <text x="252" y="95" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">50</text>
  <text x="340" y="95" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">20</text>
  <text x="428" y="95" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">40</text>
  <text x="516" y="95" fill="#475569" font-size="13" text-anchor="middle">—</text>

  <!-- index labels -->
  <text x="76"  y="122" fill="#475569" font-size="10" text-anchor="middle">[0]</text>
  <text x="164" y="122" fill="#475569" font-size="10" text-anchor="middle">[1]</text>
  <text x="252" y="122" fill="#f59e0b" font-size="10" text-anchor="middle">[2] ← insert here</text>
  <text x="340" y="122" fill="#475569" font-size="10" text-anchor="middle">[3]</text>
  <text x="428" y="122" fill="#475569" font-size="10" text-anchor="middle">[4]</text>

  <!-- Shift arrows -->
  <text x="290" y="152" fill="#64748b" font-size="11" text-anchor="middle">elements at index 2, 3, 4 must shift right one position  →  O(n)</text>
  <line x1="208" y1="140" x2="208" y2="148" stroke="#f59e0b" stroke-width="1"/>
  <line x1="560" y1="140" x2="560" y2="148" stroke="#f59e0b" stroke-width="1"/>
  <line x1="208" y1="148" x2="560" y2="148" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4"/>

  <!-- Arrows over shifting cells -->
  <line x1="252" y1="66" x2="340" y2="66" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#sarr)" stroke-dasharray="none"/>
  <line x1="340" y1="66" x2="428" y2="66" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#sarr)"/>
  <line x1="428" y1="66" x2="516" y2="66" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#sarr)"/>

  <!-- === AFTER === -->
  <text x="32" y="182" fill="#94a3b8" font-size="12" font-weight="bold">After  insert(2, 99)</text>

  <rect x="32"  y="192" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="120" y="192" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="208" y="192" width="88" height="46" fill="#14532d" rx="4" stroke="#22c55e" stroke-width="2"/>
  <rect x="296" y="192" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="384" y="192" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="472" y="192" width="88" height="46" fill="#1e3a5f" rx="4" stroke="#3b82f6" stroke-width="1.5"/>

  <text x="76"  y="221" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">10</text>
  <text x="164" y="221" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">30</text>
  <text x="252" y="221" fill="#86efac" font-size="17" font-weight="bold" text-anchor="middle">99</text>
  <text x="340" y="221" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">50</text>
  <text x="428" y="221" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">20</text>
  <text x="516" y="221" fill="#f8fafc" font-size="17" font-weight="bold" text-anchor="middle">40</text>

  <text x="76"  y="250" fill="#475569" font-size="10" text-anchor="middle">[0]</text>
  <text x="164" y="250" fill="#475569" font-size="10" text-anchor="middle">[1]</text>
  <text x="252" y="250" fill="#86efac" font-size="10" text-anchor="middle">[2] ← new</text>
  <text x="340" y="250" fill="#475569" font-size="10" text-anchor="middle">[3]</text>
  <text x="428" y="250" fill="#475569" font-size="10" text-anchor="middle">[4]</text>
  <text x="516" y="250" fill="#475569" font-size="10" text-anchor="middle">[5]</text>

  <!-- Complexity note -->
  <rect x="32" y="264" width="516" height="24" fill="#0d1117" rx="4"/>
  <text x="290" y="280" fill="#64748b" font-size="11" text-anchor="middle">Best case: insert at end  →  O(1)     |     Worst case: insert at front  →  O(n)</text>

  <defs>
    <marker id="sarr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
