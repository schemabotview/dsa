<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" width="580" height="300" font-family="monospace" font-size="12">
  <rect width="580" height="300" fill="#0f1117" rx="12"/>
  <text x="290" y="24" fill="#e2e8f0" font-size="13" font-weight="bold" text-anchor="middle">BST Deletion — Three Cases</text>

  <!-- ── CASE 1: Delete leaf ── -->
  <text x="96" y="46" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">Case 1 — Leaf node</text>
  <text x="96" y="60" fill="#475569" font-size="10" text-anchor="middle">Just remove it</text>

  <!-- Before -->
  <line x1="96" y1="98" x2="68" y2="128" stroke="#475569" stroke-width="1.5"/>
  <line x1="96" y1="98" x2="124" y2="128" stroke="#475569" stroke-width="1.5"/>
  <circle cx="96"  cy="84"  r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="96"  y="89"  fill="#94a3b8" font-size="12" text-anchor="middle">5</text>
  <circle cx="68"  cy="140" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="68"  y="145" fill="#94a3b8" font-size="11" text-anchor="middle">3</text>
  <circle cx="124" cy="140" r="14" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="124" cy="145" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle" y="145">7</text>
  <text x="124" y="128" fill="#ef4444" font-size="9" text-anchor="middle">DELETE</text>

  <!-- Arrow -->
  <text x="96" y="175" fill="#f59e0b" font-size="16" text-anchor="middle">↓</text>

  <!-- After -->
  <line x1="96" y1="208" x2="68" y2="238" stroke="#475569" stroke-width="1.5"/>
  <circle cx="96"  cy="194" r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="96"  y="199" fill="#94a3b8" font-size="12" text-anchor="middle">5</text>
  <circle cx="68"  cy="250" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="68"  y="255" fill="#94a3b8" font-size="11" text-anchor="middle">3</text>
  <text x="124" y="246" fill="#475569" font-size="10" text-anchor="middle">null</text>

  <!-- ── CASE 2: One child ── -->
  <line x1="193" y1="44" x2="193" y2="290" stroke="#1e293b" stroke-width="1" stroke-dasharray="3"/>
  <text x="290" y="46" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">Case 2 — One child</text>
  <text x="290" y="60" fill="#475569" font-size="10" text-anchor="middle">Replace node with its child</text>

  <!-- Before -->
  <line x1="290" y1="98" x2="258" y2="128" stroke="#475569" stroke-width="1.5"/>
  <line x1="290" y1="98" x2="322" y2="128" stroke="#475569" stroke-width="1.5"/>
  <line x1="322" y1="142" x2="322" y2="168" stroke="#22c55e" stroke-width="1.5"/>
  <circle cx="290" cy="84"  r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="290" y="89"  fill="#94a3b8" font-size="12" text-anchor="middle">8</text>
  <circle cx="258" cy="140" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="258" y="145" fill="#94a3b8" font-size="11" text-anchor="middle">4</text>
  <circle cx="322" cy="140" r="14" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="322" y="145" fill="#fca5a5" font-size="11" font-weight="bold" text-anchor="middle">10</text>
  <text x="322" y="128" fill="#ef4444" font-size="9" text-anchor="middle">DELETE</text>
  <circle cx="322" cy="180" r="13" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="322" y="185" fill="#86efac" font-size="11" text-anchor="middle">14</text>
  <text x="338" y="174" fill="#22c55e" font-size="9">child</text>

  <!-- Arrow -->
  <text x="290" y="215" fill="#f59e0b" font-size="16" text-anchor="middle">↓</text>

  <!-- After -->
  <line x1="290" y1="238" x2="258" y2="268" stroke="#475569" stroke-width="1.5"/>
  <line x1="290" y1="238" x2="322" y2="268" stroke="#475569" stroke-width="1.5"/>
  <circle cx="290" cy="224" r="16" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="290" y="229" fill="#94a3b8" font-size="12" text-anchor="middle">8</text>
  <circle cx="258" cy="280" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="258" y="285" fill="#94a3b8" font-size="11" text-anchor="middle">4</text>
  <circle cx="322" cy="280" r="14" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="322" y="285" fill="#86efac" font-size="11" text-anchor="middle">14</text>
  <text x="338" y="274" fill="#22c55e" font-size="9">promoted</text>

  <!-- ── CASE 3: Two children ── -->
  <line x1="387" y1="44" x2="387" y2="290" stroke="#1e293b" stroke-width="1" stroke-dasharray="3"/>
  <text x="484" y="46" fill="#94a3b8" font-size="11" font-weight="bold" text-anchor="middle">Case 3 — Two children</text>
  <text x="484" y="60" fill="#475569" font-size="10" text-anchor="middle">Replace with in-order successor</text>

  <!-- Before -->
  <line x1="484" y1="98" x2="448" y2="128" stroke="#475569" stroke-width="1.5"/>
  <line x1="484" y1="98" x2="540" y2="128" stroke="#475569" stroke-width="1.5"/>
  <line x1="448" y1="142" x2="426" y2="168" stroke="#475569" stroke-width="1.5"/>
  <line x1="448" y1="142" x2="470" y2="168" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="484" cy="84"  r="16" fill="#7f1d1d" stroke="#ef4444" stroke-width="2"/>
  <text x="484" y="89"  fill="#fca5a5" font-size="12" font-weight="bold" text-anchor="middle">5</text>
  <text x="484" y="72"  fill="#ef4444" font-size="9" text-anchor="middle">DELETE</text>
  <circle cx="448" cy="140" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="448" y="145" fill="#94a3b8" font-size="11" text-anchor="middle">3</text>
  <circle cx="540" cy="140" r="14" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="540" y="145" fill="#94a3b8" font-size="11" text-anchor="middle">8</text>
  <circle cx="426" cy="180" r="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="426" y="185" fill="#94a3b8" font-size="11" text-anchor="middle">1</text>
  <circle cx="470" cy="180" r="12" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
  <text x="470" y="185" fill="#fbbf24" font-size="11" font-weight="bold" text-anchor="middle">6</text>
  <text x="488" y="178" fill="#f59e0b" font-size="8">successor</text>

  <!-- Arrow -->
  <text x="484" y="215" fill="#f59e0b" font-size="16" text-anchor="middle">↓</text>

  <!-- After: 5 replaced by 6 -->
  <line x1="484" y1="238" x2="448" y2="268" stroke="#475569" stroke-width="1.5"/>
  <line x1="484" y1="238" x2="540" y2="268" stroke="#475569" stroke-width="1.5"/>
  <line x1="448" y1="282" x2="426" y2="296" stroke="#475569" stroke-width="1.5"/>
  <circle cx="484" cy="224" r="16" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
  <text x="484" y="229" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">6</text>
  <circle cx="448" cy="280" r="13" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="448" y="285" fill="#94a3b8" font-size="11" text-anchor="middle">3</text>
  <circle cx="540" cy="280" r="13" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="540" y="285" fill="#94a3b8" font-size="11" text-anchor="middle">8</text>
  <circle cx="426" cy="296" r="11" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="426" y="300" fill="#94a3b8" font-size="10" text-anchor="middle">1</text>
</svg>
