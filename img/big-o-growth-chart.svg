<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 380" width="580" height="380" font-family="monospace" font-size="12">
  <!-- Background -->
  <rect width="580" height="380" fill="#0f1117" rx="12"/>

  <!-- Title -->
  <text x="290" y="28" fill="#e2e8f0" font-size="14" font-weight="bold" text-anchor="middle">How Different Complexities Scale</text>

  <!-- Grid area: x=60..540, y=50..310 -->

  <!-- Grid lines (horizontal) -->
  <line x1="60" y1="310" x2="540" y2="310" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="258" x2="540" y2="258" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="206" x2="540" y2="206" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="154" x2="540" y2="154" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="102" x2="540" y2="102" stroke="#1e293b" stroke-width="1"/>
  <line x1="60" y1="50"  x2="540" y2="50"  stroke="#1e293b" stroke-width="1"/>

  <!-- Grid lines (vertical) -->
  <line x1="60"  y1="50" x2="60"  y2="310" stroke="#1e293b" stroke-width="1"/>
  <line x1="156" y1="50" x2="156" y2="310" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="252" y1="50" x2="252" y2="310" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="348" y1="50" x2="348" y2="310" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="444" y1="50" x2="444" y2="310" stroke="#1e293b" stroke-width="0.5"/>
  <line x1="540" y1="50" x2="540" y2="310" stroke="#1e293b" stroke-width="1"/>

  <!-- Axes -->
  <line x1="60" y1="310" x2="545" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#ax)"/>
  <line x1="60" y1="310" x2="60"  y2="44"  stroke="#475569" stroke-width="1.5" marker-end="url(#ax)"/>

  <!-- Axis labels -->
  <text x="295" y="340" fill="#64748b" font-size="12" text-anchor="middle">Input size  (n)</text>
  <text x="20"  y="185" fill="#64748b" font-size="12" text-anchor="middle" transform="rotate(-90 20 185)">Operations</text>

  <!-- X tick labels -->
  <text x="60"  y="325" fill="#475569" font-size="10" text-anchor="middle">0</text>
  <text x="156" y="325" fill="#475569" font-size="10" text-anchor="middle">5</text>
  <text x="252" y="325" fill="#475569" font-size="10" text-anchor="middle">10</text>
  <text x="348" y="325" fill="#475569" font-size="10" text-anchor="middle">15</text>
  <text x="444" y="325" fill="#475569" font-size="10" text-anchor="middle">20</text>

  <!--
    Coordinate mapping:
    x = 60 + n * 24   (n from 0..20)
    y = 310 - ops * k  (scaled to fit 310..50 range = 260px)

    Curves plotted for n = 0..20:
    O(1):      ops = 1         → y = 310 - 1*2   = 308
    O(log n):  ops = log2(n)   → y = 310 - log2(n)*25
    O(n):      ops = n         → y = 310 - n*12
    O(n log n):ops = n*log2(n) → y = 310 - n*log2(n)*3
    O(n²):     ops = n²        → y = 310 - n²*0.6   (capped at 50)
    O(2^n):    ops = 2^n       → y = 310 - 2^n*0.08 (capped at 50)
  -->

  <!-- O(1) — horizontal line — #22c55e green -->
  <polyline fill="none" stroke="#22c55e" stroke-width="2"
    points="60,308 540,308"/>
  <text x="544" y="312" fill="#22c55e" font-size="11">O(1)</text>

  <!-- O(log n) — #86efac light green -->
  <!-- log2: n=1→0, n=2→1, n=4→2, n=8→3, n=16→4, n=20→4.32 -->
  <polyline fill="none" stroke="#86efac" stroke-width="2"
    points="
      84,308
      108,283
      132,270
      156,260
      180,253
      204,248
      228,243
      252,239
      276,236
      300,233
      324,230
      348,228
      372,226
      396,224
      420,222
      444,221
      468,219
      492,218
      516,217
      540,216
    "/>
  <text x="544" y="220" fill="#86efac" font-size="11">O(log n)</text>

  <!-- O(n) — #7dd3fc blue -->
  <!-- y = 310 - n*12 -->
  <polyline fill="none" stroke="#7dd3fc" stroke-width="2"
    points="
      60,310
      84,298
      108,286
      132,274
      156,262
      180,250
      204,238
      228,226
      252,214
      276,202
      300,190
      324,178
      348,166
      372,154
      396,142
      420,130
      444,118
      468,106
      492,94
      516,82
      540,70
    "/>
  <text x="544" y="74" fill="#7dd3fc" font-size="11">O(n)</text>

  <!-- O(n log n) — #f59e0b amber -->
  <!-- y = 310 - n*log2(n)*3, capped at 50 -->
  <polyline fill="none" stroke="#f59e0b" stroke-width="2"
    points="
      60,310
      84,306
      108,296
      132,282
      156,262
      180,240
      204,213
      228,184
      252,152
      276,117
      300,82
      324,50
      348,50
      372,50
      396,50
    "/>
  <text x="330" y="46" fill="#f59e0b" font-size="11">O(n log n)</text>

  <!-- O(n²) — #f87171 red -->
  <!-- y = 310 - n²*0.6, capped at 50 -->
  <polyline fill="none" stroke="#f87171" stroke-width="2"
    points="
      60,310
      84,305
      108,294
      132,273
      156,241
      180,202
      204,151
      228,92
      252,50
      276,50
    "/>
  <text x="256" y="46" fill="#f87171" font-size="11">O(n²)</text>

  <!-- O(2^n) — #c084fc purple -->
  <!-- y = 310 - 2^n * 0.08, capped at 50 -->
  <polyline fill="none" stroke="#c084fc" stroke-width="2"
    points="
      60,310
      84,309
      108,307
      132,303
      156,294
      180,277
      204,245
      228,182
      252,50
      276,50
    "/>
  <text x="206" y="46" fill="#c084fc" font-size="11">O(2ⁿ)</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="ax" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="60" y="348" width="460" height="24" fill="#0f1117"/>
  <line x1="66"  y1="360" x2="90"  y2="360" stroke="#22c55e" stroke-width="2"/>  <text x="94"  y="364" fill="#94a3b8" font-size="10">constant</text>
  <line x1="156" y1="360" x2="180" y2="360" stroke="#86efac" stroke-width="2"/> <text x="184" y="364" fill="#94a3b8" font-size="10">logarithmic</text>
  <line x1="258" y1="360" x2="282" y2="360" stroke="#7dd3fc" stroke-width="2"/>  <text x="286" y="364" fill="#94a3b8" font-size="10">linear</text>
  <line x1="330" y1="360" x2="354" y2="360" stroke="#f59e0b" stroke-width="2"/> <text x="358" y="364" fill="#94a3b8" font-size="10">n log n</text>
  <line x1="410" y1="360" x2="434" y2="360" stroke="#f87171" stroke-width="2"/>  <text x="438" y="364" fill="#94a3b8" font-size="10">quadratic</text>
  <line x1="496" y1="360" x2="520" y2="360" stroke="#c084fc" stroke-width="2"/> <text x="524" y="364" fill="#94a3b8" font-size="10">exp</text>
</svg>
